<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duration Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161921;
    --surface2: #1e2230;
    --border: #252a38;
    --accent: #5b8af5;
    --accent2: #a78bfa;
    --success: #34d399;
    --danger: #f87171;
    --text: #e2e8f0;
    --text-muted: #6b7694;
    --text-dim: #3d4563;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    line-height: 1.5;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 700px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* Header */
  header {
    margin-bottom: 40px;
  }

  .header-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1 {
    font-size: 32px;
    font-weight: 600;
    letter-spacing: -0.5px;
    color: var(--text);
    line-height: 1.1;
  }

  h1 span {
    color: var(--accent2);
  }

  .header-sub {
    margin-top: 6px;
    font-size: 14px;
    color: var(--text-muted);
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 2px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 28px;
  }

  .tab-btn {
    flex: 1;
    padding: 9px 16px;
    border: none;
    border-radius: 7px;
    background: transparent;
    color: var(--text-muted);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab-btn.active {
    background: var(--surface2);
    color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }

  .tab-btn:hover:not(.active) { color: var(--text); }

  /* Tab panels */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Add Form */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 24px;
  }

  .form-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 18px;
    font-family: var(--mono);
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr 80px;
    gap: 12px;
    align-items: end;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    font-family: var(--mono);
    letter-spacing: 0.5px;
  }

  input[type="date"], input[type="number"], select {
    width: 100%;
    padding: 10px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    appearance: none;
    -webkit-appearance: none;
  }

  input[type="date"]:focus,
  input[type="number"]:focus,
  select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(91,138,245,0.1);
  }

  input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(0.6);
    cursor: pointer;
  }

  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

  select option { background: var(--surface2); }

  .btn-add {
    padding: 10px 14px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-family: var(--sans);
    font-size: 20px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.2s;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 40px;
  }

  .btn-add:hover { background: #4a79e4; transform: translateY(-1px); }
  .btn-add:active { transform: translateY(0); }

  /* Records list */
  .section-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .records-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .record-item {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    animation: slideIn 0.25s ease;
    transition: border-color 0.2s;
  }

  .record-item:hover { border-color: var(--surface2); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .record-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  .record-date {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-muted);
    min-width: 90px;
  }

  .record-duration {
    flex: 1;
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
  }

  .record-duration span {
    font-size: 12px;
    font-weight: 400;
    color: var(--accent2);
    margin-left: 4px;
  }

  .btn-delete {
    background: transparent;
    border: 1px solid transparent;
    color: var(--text-dim);
    font-size: 16px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    transition: all 0.2s;
    line-height: 1;
    flex-shrink: 0;
  }

  .btn-delete:hover {
    background: rgba(248,113,113,0.1);
    border-color: rgba(248,113,113,0.3);
    color: var(--danger);
  }

  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-dim);
    font-size: 14px;
  }

  .empty-state .icon { font-size: 36px; margin-bottom: 12px; }

  /* History tab */
  .month-group {
    margin-bottom: 8px;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .month-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 18px;
    background: var(--surface);
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }

  .month-header:hover { background: var(--surface2); }

  .month-toggle {
    font-size: 12px;
    color: var(--text-muted);
    transition: transform 0.25s;
    font-family: var(--mono);
    flex-shrink: 0;
  }

  .month-toggle.open { transform: rotate(90deg); }

  .month-name {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    flex: 1;
  }

  .month-badge {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 20px;
  }

  .month-total {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent2);
  }

  .month-body {
    display: none;
    background: var(--bg);
    border-top: 1px solid var(--border);
  }

  .month-body.open {
    display: block;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .month-body .records-list {
    padding: 12px;
  }

  /* Current month: open by default, marked differently */
  .month-group.current-month .month-header {
    border-left: 3px solid var(--accent);
  }

  .current-tag {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    background: rgba(91,138,245,0.1);
    border: 1px solid rgba(91,138,245,0.25);
    padding: 1px 7px;
    border-radius: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 10px 20px;
    border-radius: 8px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 100;
    white-space: nowrap;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 500px) {
    .form-row { grid-template-columns: 1fr 1fr; }
    .btn-add { grid-column: span 2; }
    h1 { font-size: 26px; }
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="header-label">// tracker</div>
    <h1>Duration <span>Log</span></h1>
    <p class="header-sub">Track time entries by date — minutes or hours.</p>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('records')">Records</button>
    <button class="tab-btn" onclick="switchTab('history')">History</button>
  </div>

  <!-- RECORDS TAB -->
  <div id="tab-records" class="tab-panel active">

    <div class="form-card">
      <div class="form-title">// new entry</div>
      <div class="form-row">
        <div class="field">
          <label>Date</label>
          <input type="date" id="input-date">
        </div>
        <div class="field">
          <label>Duration</label>
          <input type="number" id="input-duration" placeholder="e.g. 90" min="1" step="1">
        </div>
        <div class="field">
          <label>Unit</label>
          <select id="input-unit">
            <option value="min">min</option>
            <option value="hr">hr</option>
          </select>
        </div>
      </div>
      <div style="margin-top: 14px; display: flex; justify-content: flex-end;">
        <button class="btn-add" onclick="addRecord()" style="padding: 10px 24px; font-size: 14px; font-weight: 600; letter-spacing: 0.5px; height: auto;">
          + Add Record
        </button>
      </div>
    </div>

    <div class="section-label">// this month</div>
    <div class="records-list" id="current-records"></div>

  </div>

  <!-- HISTORY TAB -->
  <div id="tab-history" class="tab-panel">
    <div id="history-container"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY = 'duration_records_v1';

  // ─── Helpers ──────────────────────────────────────────────

  function getRecords() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }

  function saveRecords(records) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
  }

  function getMonthKey(dateStr) {
    const [y, m] = dateStr.split('-');
    return `${y}-${m}`;
  }

  function formatMonthName(key) {
    const [y, m] = key.split('-');
    const d = new Date(y, parseInt(m) - 1, 1);
    return d.toLocaleString('default', { month: 'long', year: 'numeric' });
  }

  function currentMonthKey() {
    const now = new Date();
    return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
  }

  function formatDuration(value, unit) {
    return `${value} <span>${unit}</span>`;
  }

  function totalDuration(records) {
    let mins = 0, hrs = 0;
    for (const r of records) {
      if (r.unit === 'min') mins += r.duration;
      else hrs += r.duration;
    }
    // Normalize to hours if >= 60 min
    const totalMin = mins + hrs * 60;
    if (totalMin >= 60) {
      const h = Math.floor(totalMin / 60);
      const m = totalMin % 60;
      return m > 0 ? `${h}h ${m}m` : `${h}h`;
    }
    return `${totalMin}m`;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  // ─── Core ─────────────────────────────────────────────────

  function addRecord() {
    const dateEl = document.getElementById('input-date');
    const durEl = document.getElementById('input-duration');
    const unitEl = document.getElementById('input-unit');

    const date = dateEl.value;
    const duration = parseInt(durEl.value);
    const unit = unitEl.value;

    if (!date) { showToast('⚠ Please select a date.'); return; }
    if (!duration || duration < 1) { showToast('⚠ Enter a valid duration.'); return; }

    const records = getRecords();
    records.push({ id: Date.now(), date, duration, unit });
    records.sort((a, b) => b.date.localeCompare(a.date));
    saveRecords(records);

    durEl.value = '';
    render();
    showToast('✓ Record added.');
  }

  function deleteRecord(id) {
    const records = getRecords().filter(r => r.id !== id);
    saveRecords(records);
    render();
    showToast('✗ Record deleted.');
  }

  // ─── Render ───────────────────────────────────────────────

  function renderRecordItem(r) {
    const div = document.createElement('div');
    div.className = 'record-item';
    div.innerHTML = `
      <div class="record-dot"></div>
      <div class="record-date">${r.date}</div>
      <div class="record-duration">${formatDuration(r.duration, r.unit)}</div>
      <button class="btn-delete" onclick="deleteRecord(${r.id})" title="Delete">✕</button>
    `;
    return div;
  }

  function renderCurrentTab() {
    const cmk = currentMonthKey();
    const records = getRecords().filter(r => getMonthKey(r.date) === cmk);
    const container = document.getElementById('current-records');
    container.innerHTML = '';

    if (records.length === 0) {
      container.innerHTML = `<div class="empty-state"><div class="icon">◷</div>No records for this month yet.</div>`;
      return;
    }

    records.forEach(r => container.appendChild(renderRecordItem(r)));
  }

  function renderHistoryTab() {
    const container = document.getElementById('history-container');
    container.innerHTML = '';

    const records = getRecords();
    if (records.length === 0) {
      container.innerHTML = `<div class="empty-state"><div class="icon">◷</div>No history yet.</div>`;
      return;
    }

    const cmk = currentMonthKey();

    // Group by month
    const groups = {};
    for (const r of records) {
      const mk = getMonthKey(r.date);
      if (!groups[mk]) groups[mk] = [];
      groups[mk].push(r);
    }

    // Sort months descending
    const sortedMonths = Object.keys(groups).sort((a, b) => b.localeCompare(a));

    sortedMonths.forEach(mk => {
      const isCurrent = mk === cmk;
      const monthRecords = groups[mk];

      const group = document.createElement('div');
      group.className = 'month-group' + (isCurrent ? ' current-month' : '');
      group.dataset.month = mk;

      const bodyId = `month-body-${mk}`;
      const toggleId = `toggle-${mk}`;

      group.innerHTML = `
        <div class="month-header" onclick="toggleMonth('${mk}')">
          <span class="month-toggle ${isCurrent ? 'open' : ''}" id="${toggleId}">▶</span>
          <span class="month-name">${formatMonthName(mk)}</span>
          ${isCurrent ? '<span class="current-tag">current</span>' : ''}
          <span class="month-badge">${monthRecords.length} entr${monthRecords.length === 1 ? 'y' : 'ies'}</span>
          <span class="month-total">${totalDuration(monthRecords)}</span>
        </div>
        <div class="month-body ${isCurrent ? 'open' : ''}" id="${bodyId}">
          <div class="records-list"></div>
        </div>
      `;

      const list = group.querySelector('.records-list');
      monthRecords.forEach(r => list.appendChild(renderRecordItem(r)));

      container.appendChild(group);
    });
  }

  function toggleMonth(mk) {
    const body = document.getElementById(`month-body-${mk}`);
    const toggle = document.getElementById(`toggle-${mk}`);
    const isOpen = body.classList.contains('open');
    body.classList.toggle('open', !isOpen);
    toggle.classList.toggle('open', !isOpen);
  }

  function render() {
    renderCurrentTab();
    renderHistoryTab();
  }

  // ─── Tabs ─────────────────────────────────────────────────

  function switchTab(name) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`tab-${name}`).classList.add('active');
    document.querySelectorAll('.tab-btn').forEach(b => {
      if (b.textContent.toLowerCase() === name) b.classList.add('active');
    });
  }

  // ─── Init ─────────────────────────────────────────────────

  // Set default date to today
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('input-date').value = today;

  render();
</script>
</body>
</html>
